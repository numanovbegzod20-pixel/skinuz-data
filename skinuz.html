<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

<title>RFL PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body,#root{background:#0A0A0F;color:#F0EAD6;font-family:'Barlow','Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;user-select:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2A2A3A;border-radius:2px}
.page{padding:16px 16px 90px;min-height:100vh;animation:fadeIn 0.3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(200,168,75,0.2)}50%{box-shadow:0 0 30px rgba(200,168,75,0.4),0 0 60px rgba(200,168,75,0.2)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes winnerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06);box-shadow:0 0 30px rgba(200,168,75,0.5)}}
@keyframes floatCrystal{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(5deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes checkPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.btn-primary{background:linear-gradient(135deg,#C8A84B,#8A6F2E);color:#0A0A0F;border:none;border-radius:12px;padding:16px 28px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;width:100%;box-shadow:0 4px 20px rgba(200,168,75,0.3)}
.btn-primary:active{transform:scale(0.97);opacity:0.9}
.btn-tg{background:linear-gradient(135deg,#0088cc,#006699);color:#fff;border:none;border-radius:12px;padding:16px 28px;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;width:100%;box-shadow:0 4px 20px rgba(0,136,204,0.3)}
.btn-tg:active{transform:scale(0.97)}
.btn-secondary{background:transparent;border:1px solid #2A2A3A;border-radius:12px;padding:14px 20px;font-family:'Rajdhani',sans-serif;font-size:14px;color:#7A7A9A;cursor:pointer;letter-spacing:1px;width:100%;margin-top:8px}
.card{background:#1A1A25;border:1px solid #2A2A3A;border-radius:14px;overflow:hidden}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#13131A;border:1px solid #2A2A3A;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;animation:slideUp 0.3s ease;max-height:92vh;overflow-y:auto}
.input-field{width:100%;background:#0A0A0F;border:1px solid #2A2A3A;border-radius:10px;padding:13px 14px;color:#F0EAD6;font-family:'Barlow',sans-serif;font-size:14px;outline:none;margin-bottom:10px;transition:border 0.2s}
.input-field:focus{border-color:#C8A84B}
.task-card{background:#1A1A25;border:1px solid #2A2A3A;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all 0.2s;cursor:pointer}
.task-card:active{transform:scale(0.98)}
.task-card.done{opacity:0.6;cursor:default}
.task-card.done:active{transform:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ═══════════════════════════════════════════════════════════
//   !! SOZLAMALAR - BU YERLARNI O'ZGARTIRING
// ═══════════════════════════════════════════════════════════
const ADMIN_USERNAME = "admin_username";       // Admin Telegram username (@siz)
const CHANNEL_USERNAME = "your_channel";       // Kanal username (@siz)
const CHANNEL_LINK = `https://t.me/${CHANNEL_USERNAME}`;
const ADMIN_LINK = `https://t.me/${ADMIN_USERNAME}`;
const BOT_USERNAME = "YourBot";               // Bot username
// ═══════════════════════════════════════════════════════════

const tg = window?.Telegram?.WebApp || {
  initDataUnsafe:{user:{id:123456789,username:"demo_user",first_name:"Demo",photo_url:null}},
  expand:()=>{},ready:()=>{}
};

const C={bg:"#0A0A0F",surface:"#13131A",card:"#1A1A25",border:"#2A2A3A",accent:"#C8A84B",accentGlow:"rgba(200,168,75,0.25)",accentDim:"#8A6F2E",text:"#F0EAD6",textMuted:"#7A7A9A",red:"#E53935",green:"#43A047",blue:"#0088cc",purple:"#8E24AA"};
const RC={legendary:"#FFD700",mythic:"#E040FB",epic:"#7C4DFF",rare:"#2979FF",common:"#78909C"};

// ── LOCAL STORAGE helpers ──────────────────────────────────
const LS = {
  get:(k,def)=>{ try{const v=localStorage.getItem(k); return v?JSON.parse(v):def;}catch{return def;}},
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ── DEFAULT DATA ───────────────────────────────────────────
const DEFAULT_CASES=[
  {id:1,name:"NOVA CASE",price:200,opened:14823,img:null,emoji:"💎",rarity:"legendary",items:[
    {name:"AK-47 | Redline",rarity:"rare",img:null,emoji:"🔫"},
    {name:"M4A4 | Asiimov",rarity:"epic",img:null,emoji:"🔫"},
    {name:"AWP | Lightning Strike",rarity:"legendary",img:null,emoji:"🎯"},
    {name:"Glock-18 | Fade",rarity:"rare",img:null,emoji:"🔫"},
    {name:"Desert Eagle | Blaze",rarity:"epic",img:null,emoji:"🔥"},
  ]},
  {id:2,name:"SHADOW BOX",price:150,opened:8341,img:null,emoji:"🌑",rarity:"epic",items:[
    {name:"USP-S | Orion",rarity:"rare",img:null,emoji:"🔫"},
    {name:"AK-47 | Vulcan",rarity:"epic",img:null,emoji:"🔫"},
    {name:"P250 | Cartel",rarity:"common",img:null,emoji:"🔫"},
    {name:"MP9 | Rose Iron",rarity:"rare",img:null,emoji:"🌹"},
    {name:"CZ75-Auto | Crimson Web",rarity:"rare",img:null,emoji:"🔫"},
  ]},
  {id:3,name:"CRYSTAL VAULT",price:500,opened:2109,img:null,emoji:"🔷",rarity:"mythic",items:[
    {name:"AWP | Dragon Lore",rarity:"mythic",img:null,emoji:"🐉"},
    {name:"AK-47 | Fire Serpent",rarity:"legendary",img:null,emoji:"🐍"},
    {name:"M4A4 | Howl",rarity:"mythic",img:null,emoji:"🐺"},
    {name:"Butterfly Knife | Fade",rarity:"legendary",img:null,emoji:"🦋"},
    {name:"Karambit | Crimson Web",rarity:"legendary",img:null,emoji:"🔪"},
  ]},
  {id:4,name:"STANDARD CASE",price:75,opened:52344,img:null,emoji:"📦",rarity:"common",items:[
    {name:"PP-Bizon | Water Sigil",rarity:"common",img:null,emoji:"💧"},
    {name:"Tec-9 | Fuel Injector",rarity:"common",img:null,emoji:"⛽"},
    {name:"Nova | Antique",rarity:"common",img:null,emoji:"🏺"},
    {name:"SG 553 | Aerial",rarity:"rare",img:null,emoji:"✈️"},
    {name:"FAMAS | Meltdown",rarity:"rare",img:null,emoji:"☢️"},
  ]},
];
const DEFAULT_MARKET=[
  {id:1,name:"AK-47 | Redline",category:"Rifle",price:450,wear:"FT",img:null,emoji:"🔫",rarity:"rare"},
  {id:2,name:"AWP | Asiimov",category:"Sniper",price:890,wear:"BS",img:null,emoji:"🎯",rarity:"epic"},
  {id:3,name:"M4A4 | Howl",category:"Rifle",price:3200,wear:"MW",img:null,emoji:"🐺",rarity:"mythic"},
  {id:4,name:"Karambit | Fade",category:"Knife",price:2800,wear:"FN",img:null,emoji:"🔪",rarity:"legendary"},
  {id:5,name:"Glock-18 | Fade",category:"Pistol",price:1100,wear:"FN",img:null,emoji:"🔫",rarity:"rare"},
  {id:6,name:"USP-S | Orion",category:"Pistol",price:320,wear:"FT",img:null,emoji:"🔫",rarity:"rare"},
  {id:7,name:"Desert Eagle | Blaze",category:"Pistol",price:780,wear:"FN",img:null,emoji:"🔥",rarity:"epic"},
  {id:8,name:"Butterfly Knife | Tiger Tooth",category:"Knife",price:1950,wear:"MW",img:null,emoji:"🦋",rarity:"legendary"},
];

// ── HELPERS ────────────────────────────────────────────────
const Crystal=({size=20})=>(
  <svg width={size} height={size} viewBox="0 0 24 24">
    <polygon points="12,2 20,8 20,16 12,22 4,16 4,8" fill="#C8A84B" opacity="0.9"/>
    <polygon points="12,2 20,8 12,12" fill="rgba(255,255,255,0.3)"/>
    <polygon points="4,8 12,12 12,22" fill="rgba(0,0,0,0.3)"/>
  </svg>
);
const Img=({item,size=60})=>(
  item?.img
    ?<img src={item.img} alt={item.name} style={{width:size,height:size,objectFit:"contain",borderRadius:8}}/>
    :<span style={{fontSize:size*0.65,lineHeight:1}}>{item?.emoji||"🎁"}</span>
);
const Header=({user,balance})=>(
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,paddingTop:4}}>
    <div>
      <div style={{fontSize:11,color:C.textMuted,fontFamily:"'Rajdhani',sans-serif",letterSpacing:2,textTransform:"uppercase"}}>RFL PRO</div>
      <div style={{fontSize:18,fontFamily:"'Rajdhani',sans-serif",fontWeight:700}}>{user?.first_name||"Player"}</div>
    </div>
    <div style={{display:"flex",alignItems:"center",gap:8,background:C.card,border:`1px solid ${C.border}`,borderRadius:24,padding:"8px 16px"}}>
      <Crystal size={16}/>
      <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:700,color:C.accent}}>{balance.toLocaleString()}</span>
    </div>
  </div>
);

// ══════════════════════════════════════════════════════════
//  🔐 LOGIN / REGISTER SCREEN
// ══════════════════════════════════════════════════════════
const AuthScreen=({onLogin})=>{
  const [mode,setMode]=useState("welcome"); // welcome | login | register
  const [form,setForm]=useState({username:"",password:"",name:""});
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  // Agar Telegram WebApp ichida bo'lsa, avtomatik login
  const tgUser=tg.initDataUnsafe?.user;
  const autoLogin=()=>{
    if(tgUser){
      const saved=LS.get("rfl_users",{});
      const key=`tg_${tgUser.id}`;
      if(!saved[key]){
        saved[key]={id:tgUser.id,username:tgUser.username||"user"+tgUser.id,name:tgUser.first_name,balance:500,inventory:[],completedTasks:[],joinedAt:new Date().toLocaleDateString("uz"),loginType:"telegram"};
        LS.set("rfl_users",saved);
      }
      LS.set("rfl_current",key);
      onLogin(saved[key]);
    }
  };

  const handleRegister=()=>{
    setErr("");
    if(!form.name.trim()||!form.username.trim()||!form.password.trim()){setErr("Barcha maydonlarni to'ldiring!");return;}
    if(form.password.length<6){setErr("Parol kamida 6 ta belgi bo'lishi kerak!");return;}
    const saved=LS.get("rfl_users",{});
    const exists=Object.values(saved).find(u=>u.username===form.username.trim());
    if(exists){setErr("Bu username band! Boshqasini tanlang.");return;}
    setLoading(true);
    setTimeout(()=>{
      const key="usr_"+Date.now();
      const newUser={id:key,username:form.username.trim(),name:form.name.trim(),balance:500,inventory:[],completedTasks:[],joinedAt:new Date().toLocaleDateString("uz"),loginType:"manual"};
      saved[key]=newUser;
      LS.set("rfl_users",saved);
      LS.set("rfl_current",key);
      setLoading(false);
      onLogin(newUser);
    },1000);
  };

  const handleLogin=()=>{
    setErr("");
    if(!form.username.trim()||!form.password.trim()){setErr("Username va parolni kiriting!");return;}
    const saved=LS.get("rfl_users",{});
    const found=Object.entries(saved).find(([,u])=>u.username===form.username.trim());
    if(!found){setErr("Foydalanuvchi topilmadi!");return;}
    setLoading(true);
    setTimeout(()=>{
      LS.set("rfl_current",found[0]);
      setLoading(false);
      onLogin(found[1]);
    },800);
  };

  // Welcome screen
  if(mode==="welcome") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,animation:"fadeInScale 0.5s ease"}}>
      {/* Logo */}
      <div style={{marginBottom:32,textAlign:"center"}}>
        <div style={{animation:"floatCrystal 3s ease-in-out infinite",display:"inline-block",marginBottom:16}}>
          <svg width={80} height={80} viewBox="0 0 24 24">
            <polygon points="12,2 20,8 20,16 12,22 4,16 4,8" fill="#C8A84B" opacity="0.95"/>
            <polygon points="12,2 20,8 12,12" fill="rgba(255,255,255,0.35)"/>
            <polygon points="4,8 12,12 12,22" fill="rgba(0,0,0,0.25)"/>
          </svg>
        </div>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:38,fontWeight:700,letterSpacing:6,color:C.accent,marginBottom:4}}>RFL PRO</div>
        <div style={{fontSize:13,color:C.textMuted,letterSpacing:2}}>KRISTAL & SKIN PLATFORMASI</div>
      </div>

      {/* Features */}
      <div style={{width:"100%",maxWidth:340,marginBottom:32}}>
        {[["💎","Case oching, qimmatbaho skinlar yutib oling"],["🛒","Marketdan skinlar sotib oling"],["📤","Skinlarni Steam ga chiqarib oling"],["👥","Do'stlarni taklif qilib bonus oling"]].map(([i,t])=>(
          <div key={t} style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,padding:"12px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:12}}>
            <span style={{fontSize:22}}>{i}</span>
            <span style={{fontSize:13,color:C.textMuted}}>{t}</span>
          </div>
        ))}
      </div>

      <div style={{width:"100%",maxWidth:340}}>
        {tgUser&&(
          <button className="btn-tg" onClick={autoLogin} style={{marginBottom:10}}>
            ✈️ TELEGRAM ORQALI KIRISH
          </button>
        )}
        <button className="btn-primary" onClick={()=>setMode("register")} style={{marginBottom:8}}>
          🆕 RO'YXATDAN O'TISH
        </button>
        <button className="btn-secondary" onClick={()=>setMode("login")}>
          🔑 KIRISH (LOGIN)
        </button>
      </div>
    </div>
  );

  // Register screen
  if(mode==="register") return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",padding:24,animation:"fadeIn 0.3s ease"}}>
      <button onClick={()=>setMode("welcome")} style={{background:"transparent",border:"none",color:C.textMuted,cursor:"pointer",fontSize:22,alignSelf:"flex-start",marginBottom:16}}>←</button>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:8}}>🆕</div>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:26,fontWeight:700,color:C.accent}}>Ro'yxatdan o'tish</div>
        <div style={{fontSize:13,color:C.textMuted,marginTop:4}}>Kirganingizda 💎 500 kristal sovg'a!</div>
      </div>

      <div style={{flex:1}}>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:6,fontFamily:"'Rajdhani',sans-serif",letterSpacing:1}}>ISM FAMILIYA</div>
        <input className="input-field" placeholder="Ism Familiya" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>

        <div style={{fontSize:12,color:C.textMuted,marginBottom:6,fontFamily:"'Rajdhani',sans-serif",letterSpacing:1}}>USERNAME</div>
        <input className="input-field" placeholder="username (@ siz)" value={form.username} onChange={e=>setForm({...form,username:e.target.value.replace(/\s/g,"")})}/>

        <div style={{fontSize:12,color:C.textMuted,marginBottom:6,fontFamily:"'Rajdhani',sans-serif",letterSpacing:1}}>PAROL</div>
        <input className="input-field" type="password" placeholder="Kamida 6 ta belgi" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>

        {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,background:`${C.red}10`,border:`1px solid ${C.red}30`,borderRadius:8,padding:"8px 12px"}}>⚠️ {err}</div>}

        <button className="btn-primary" onClick={handleRegister} disabled={loading}>
          {loading?<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>:"✅ RO'YXATDAN O'TISH"}
        </button>

        <div style={{textAlign:"center",marginTop:16,fontSize:13,color:C.textMuted}}>
          Akkauntingiz bormi?{" "}
          <span onClick={()=>setMode("login")} style={{color:C.accent,cursor:"pointer",fontFamily:"'Rajdhani',sans-serif",fontWeight:700}}>KIRISH</span>
        </div>
      </div>
    </div>
  );

  // Login screen
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",padding:24,animation:"fadeIn 0.3s ease"}}>
      <button onClick={()=>setMode("welcome")} style={{background:"transparent",border:"none",color:C.textMuted,cursor:"pointer",fontSize:22,alignSelf:"flex-start",marginBottom:16}}>←</button>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:36,marginBottom:8}}>🔑</div>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:26,fontWeight:700,color:C.accent}}>Kirish</div>
        <div style={{fontSize:13,color:C.textMuted,marginTop:4}}>Akkauntingizga kiring</div>
      </div>

      <div style={{flex:1}}>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:6,fontFamily:"'Rajdhani',sans-serif",letterSpacing:1}}>USERNAME</div>
        <input className="input-field" placeholder="username" value={form.username} onChange={e=>setForm({...form,username:e.target.value.replace(/\s/g,"")})}/>

        <div style={{fontSize:12,color:C.textMuted,marginBottom:6,fontFamily:"'Rajdhani',sans-serif",letterSpacing:1}}>PAROL</div>
        <input className="input-field" type="password" placeholder="Parol" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>

        {err&&<div style={{color:C.red,fontSize:12,marginBottom:12,background:`${C.red}10`,border:`1px solid ${C.red}30`,borderRadius:8,padding:"8px 12px"}}>⚠️ {err}</div>}

        <button className="btn-primary" onClick={handleLogin} disabled={loading}>
          {loading?<span style={{animation:"spin 1s linear infinite",display:"inline-block"}}>⟳</span>:"🔑 KIRISH"}
        </button>

        {tgUser&&(
          <button className="btn-tg" onClick={autoLogin} style={{marginTop:8}}>
            ✈️ TELEGRAM ORQALI KIRISH
          </button>
        )}

        <div style={{textAlign:"center",marginTop:16,fontSize:13,color:C.textMuted}}>
          Akkaunt yo'qmi?{" "}
          <span onClick={()=>setMode("register")} style={{color:C.accent,cursor:"pointer",fontFamily:"'Rajdhani',sans-serif",fontWeight:700}}>RO'YXATDAN O'TISH</span>
        </div>
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════════════════
//  💎 PAYMENT MODAL
// ══════════════════════════════════════════════════════════
const PaymentModal=({onClose})=>(
  <div className="modal-overlay" onClick={onClose}>
    <div className="modal-box" onClick={e=>e.stopPropagation()}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:12}}>💬</div>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:22,fontWeight:700,marginBottom:8}}>Adminga murojaat qiling</div>
        <div style={{fontSize:13,color:C.textMuted,lineHeight:1.7,marginBottom:20}}>To'lov qilish uchun admin bilan bog'laning. Admin rekvizitlarni yuboradi va kristallarni qo'shib beradi.</div>
        <div style={{background:`${C.accent}08`,border:`1px solid ${C.accent}25`,borderRadius:12,padding:14,marginBottom:20,textAlign:"left"}}>
          {[["500","10,000"],["1,200","20,000"],["3,500","50,000"],["10,000","100,000 🔥"]].map(([cr,sum])=>(
            <div key={cr} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #2A2A3A40"}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}><Crystal size={12}/><span style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:C.accent}}>{cr}</span><span style={{fontSize:12,color:C.textMuted}}>kristal</span></div>
              <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:14}}>{sum} so'm</span>
            </div>
          ))}
        </div>
        <a href={ADMIN_LINK} target="_blank" style={{textDecoration:"none",display:"block",marginBottom:8}}>
          <button className="btn-primary">📩 ADMINGA MUROJAAT QILISH</button>
        </a>
        <button className="btn-secondary" onClick={onClose}>Yopish</button>
      </div>
    </div>
  </div>
);

// ══════════════════════════════════════════════════════════
//  🔗 STEAM MODAL
// ══════════════════════════════════════════════════════════
const SteamModal=({item,onClose,onSubmit})=>{
  const [link,setLink]=useState("");
  const [err,setErr]=useState("");
  const submit=()=>{
    if(!link.trim()){setErr("Steam trade link kiritish majburiy!");return;}
    if(!link.includes("steamcommunity.com")){setErr("Noto'g'ri link! steamcommunity.com bo'lishi kerak");return;}
    onSubmit(link);
  };
  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()}>
        <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:20,fontWeight:700,marginBottom:4}}>🔗 Steam Trade Link</div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:16}}>Skinni olish uchun Steam Trade Link kiriting</div>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14,marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
          <Img item={item} size={44}/>
          <div>
            <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:14,fontWeight:700}}>{item?.name}</div>
            <div className="tag" style={{background:`${RC[item?.rarity]||C.border}25`,color:RC[item?.rarity]||C.textMuted}}>{item?.rarity}</div>
          </div>
        </div>
        <div style={{fontSize:12,color:C.textMuted,marginBottom:6}}>Steam Trade Link:</div>
        <input className="input-field" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=..." value={link} onChange={e=>{setLink(e.target.value);setErr("")}}/>
        {err&&<div style={{color:C.red,fontSize:12,marginBottom:8}}>⚠️ {err}</div>}
        <div style={{background:`${C.blue}10`,border:`1px solid ${C.blue}25`,borderRadius:10,padding:"10px 12px",marginBottom:16,fontSize:12,color:C.textMuted,lineHeight:1.6}}>
          💡 Steam → Inventar → Trade Offers → Kim bilan almashishni bilaman → Trade Link
        </div>
        <button className="btn-primary" onClick={submit}>✅ TASDIQLASH VA YUBORISH</button>
        <button className="btn-secondary" onClick={onClose}>Bekor qilish</button>
      </div>
    </div>
  );
};

const TasksPage=({user,balance,setBalance,completedTasks,setCompletedTasks,saveUser})=>{
  const [checking,setChecking]=useState(null);
  const [toast,setToast]=useState(null);

  const showToast=(msg,color=C.green)=>{
    setToast({msg,color});
    setTimeout(()=>setToast(null),2500);
  };

  const TASKS=[
    {id:"channel_subscribe",icon:"📢",title:`Kanalga obuna bo'ling`,desc:`@${CHANNEL_USERNAME} kanaliga obuna bo'ling`,reward:50,link:CHANNEL_LINK,checkable:true,type:"channel"},
    {id:"invite_friend_1",icon:"👥",title:"1 ta do'st taklif qiling",desc:"Referal link orqali do'st olib keling",reward:250,link:null,checkable:false,type:"referral"},
    {id:"invite_5",icon:"🏆",title:"5 ta do'st taklif qiling",desc:"5 nafar do'stingizni ro'yxatdan o'tkaz",reward:1000,link:null,checkable:false,type:"referral"},
    {id:"open_first_case",icon:"📦",title:"Birinchi caseni oching",desc:"Ixtiyoriy caseni birinchi marta oching",reward:100,type:"auto"},
    {id:"buy_market",icon:"🛒",title:"Marketdan skin sotib oling",desc:"Market sahifasidan biror skin sotib oling",reward:75,type:"auto"},
    {id:"daily_login",icon:"📅",title:"Har kuni kiring",desc:"Bugun ilovani ochdingiz",reward:25,type:"auto"},
    {id:"profile_complete",icon:"👤",title:"Profilni to'ldiring",desc:"Steam link qo'shing va profil to'liqlanadi",reward:30,type:"auto"},
    {id:"follow_admin",icon:"👑",title:"Admin kanaliga qo'shiling",desc:`@${ADMIN_USERNAME} ga murojaat qiling`,reward:20,link:ADMIN_LINK,checkable:true,type:"channel"},
  ];

  // Auto tasks - har doim bajarilgan hisoblash
  const getEffectiveDone=(task)=>{
    if(completedTasks.includes(task.id)) return true;
    if(task.id==="daily_login") return true; // bugun kirdi
    return false;
  };

  const handleTask=async(task)=>{
    if(getEffectiveDone(task)) return;

    if(task.type==="auto"){
      // Auto tasklarni bajarilgan qilish
      const newDone=[...completedTasks,task.id];
      setCompletedTasks(newDone);
      setBalance(b=>b+task.reward);
      saveUser({completedTasks:newDone,balance:balance+task.reward});
      showToast(`+${task.reward} 💎 kristal olindi!`);
      return;
    }

    if(task.link){
      window.open(task.link,"_blank");
    }

    if(task.checkable){
      setChecking(task.id);
      // 3 soniya kutish - foydalanuvchi obuna bo'lishi uchun
      setTimeout(()=>{
        setChecking(null);
        const newDone=[...completedTasks,task.id];
        setCompletedTasks(newDone);
        setBalance(b=>b+task.reward);
        saveUser({completedTasks:newDone,balance:balance+task.reward});
        showToast(`+${task.reward} 💎 kristal olindi!`);
      },3000);
    }
  };

  const doneCount=TASKS.filter(t=>getEffectiveDone(t)).length;
  const totalReward=TASKS.reduce((s,t)=>s+t.reward,0);

  return(
    <div className="page">
      <Header user={user} balance={balance}/>

      {/* Progress */}
      <div className="card" style={{padding:16,marginBottom:20,background:`linear-gradient(135deg,${C.card},#0A1A0A)`,border:`1px solid ${C.green}30`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:14,fontWeight:700}}>Vazifalar progressi</div>
          <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:14,color:C.accent}}>{doneCount}/{TASKS.length}</div>
        </div>
        <div style={{height:6,background:C.border,borderRadius:10,overflow:"hidden",marginBottom:8}}>
          <div style={{height:"100%",width:`${(doneCount/TASKS.length)*100}%`,background:`linear-gradient(90deg,${C.green},${C.accent})`,borderRadius:10,transition:"width 0.5s ease"}}/>
        </div>
        <div style={{fontSize:12,color:C.textMuted}}>
          Barchasi bajarilsa: <span style={{color:C.accent,fontFamily:"'Rajdhani',sans-serif",fontWeight:700}}>💎 {totalReward.toLocaleString()} kristal</span>
        </div>
      </div>

      {/* Tasks */}
      {TASKS.map(task=>{
        const done=getEffectiveDone(task);
        const isChecking=checking===task.id;
        return(
          <div key={task.id} className={`task-card ${done?"done":""}`} onClick={()=>handleTask(task)}
            style={{border:`1px solid ${done?C.green+"40":C.border}`,background:done?`${C.green}08`:C.card}}>
            <div style={{width:48,height:48,borderRadius:12,background:done?`${C.green}20`:`${C.accent}15`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>
              {task.icon}
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:15,fontWeight:700,marginBottom:2}}>{task.title}</div>
              <div style={{fontSize:11,color:C.textMuted,lineHeight:1.4}}>{task.desc}</div>
              <div style={{display:"flex",alignItems:"center",gap:4,marginTop:6}}>
                <Crystal size={11}/>
                <span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:13,fontWeight:700,color:done?C.textMuted:C.accent}}>+{task.reward} kristal</span>
              </div>
            </div>
            <div style={{flexShrink:0}}>
              {done
                ? <div style={{width:32,height:32,borderRadius:"50%",background:`${C.green}20`,border:`2px solid ${C.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,animation:"checkPop 0.3s ease"}}>✅</div>
                : isChecking
                ? <div style={{animation:"spin 1s linear infinite",fontSize:20}}>⟳</div>
                : <div style={{width:32,height:32,borderRadius:"50%",background:`${C.accent}15`,border:`2px solid ${C.accent}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>›</div>
              }
            </div>
          </div>
        );
      })}

      {/* Toast */}
      {toast&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:toast.color,color:"#fff",padding:"12px 24px",borderRadius:12,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:15,letterSpacing:1,zIndex:9999,animation:"slideUp 0.3s ease",whiteSpace:"nowrap",boxShadow:`0 4px 20px ${toast.color}50`}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
};

const CasesPage=({user,balance,setBalance,setInventory,cases,onTaskComplete})=>{
  const [sel,setSel]=useState(null);
  const [spinning,setSpinning]=useState(false);
  const [rItems,setRItems]=useState([]);
  const [result,setResult]=useState(null);
  const [tx,setTx]=useState(0);
  const IW=130,WI=30;

  const openCase=async(cs)=>{
    if(balance<cs.price){alert("Balansingiz yetarli emas!");return;}
    setBalance(b=>b-cs.price);setSel(cs);setResult(null);setTx(0);
    const arr=Array.from({length:40},(_,i)=>{const ri=cs.items[Math.floor(Math.random()*cs.items.length)];return{...ri,uid:i};});
    const winner={...cs.items[Math.floor(Math.random()*cs.items.length)],uid:"w",id:Date.now()};
    arr[WI]=winner;
    setRItems(arr);setSpinning(true);
    const end=-(WI*(IW+8))+320/2-IW/2;
    await new Promise(r=>setTimeout(r,60));
    setTx(end);
    setTimeout(()=>{
      setSpinning(false);setResult(winner);
      setInventory(prev=>[...prev,{...winner,id:Date.now(),obtainedAt:new Date().toLocaleDateString("uz"),source:"case"}]);
      onTaskComplete("open_first_case");
    },4500);
  };
  const close=()=>{setSel(null);setResult(null);setSpinning(false);};

  return(
    <div className="page">
      <Header user={user} balance={balance}/>
      <div style={{fontSize:12,color:C.textMuted,fontFamily:"'Rajdhani',sans-serif",letterSpacing:2,textTransform:"uppercase",marginBottom:16}}>Mavjud caseler</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {cases.map(cs=>(
          <div key={cs.id} className="card" style={{cursor:"pointer"}} onClick={()=>openCase(cs)}>
            <div style={{height:130,display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(circle at center,${RC[cs.rarity]}18,transparent)`,borderBottom:`1px solid ${C.border}`,overflow:"hidden"}}>
              {cs.img?<img src={cs.img} alt={cs.name} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:58}}>{cs.emoji||"📦"}</span>}
            </div>
            <div style={{padding:12}}>
              <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:14,fontWeight:700,letterSpacing:1,marginBottom:4}}>{cs.name}</div>
              <div className="tag" style={{background:`${RC[cs.rarity]}20`,color:RC[cs.rarity],marginBottom:8}}>{cs.rarity}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}><Crystal size={12}/><span style={{fontFamily:"'Rajdhani',sans-serif",fontSize:16,fontWeight:700,color:C.accent}}>{cs.price}</span></div>
                <div style={{fontSize:10,color:C.textMuted}}>{cs.opened.toLocaleString()} ta</div>
              </div>
            </div>
          </div>
        ))}
      </div>

      {sel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:1000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{fontSize:11,color:C.textMuted,fontFamily:"'Rajdhani',sans-serif",letterSpacing:3,marginBottom:8}}>{sel.name}</div>
          <div style={{marginBottom:20,width:70,height:70,display:"flex",alignItems:"center",justifyContent:"center",background:`radial-gradient(circle,${RC[sel.rarity]}25,transparent)`,borderRadius:14}}>
            <Img item={sel} size={52}/>
          </div>
          {rItems.length>0&&(
            <div style={{position:"relative",width:"100%",maxWidth:340,marginBottom:24}}>
              <div style={{position:"absolute",top:0,bottom:0,left:"50%",transform:"translateX(-50%)",width:3,background:C.accent,zIndex:10,boxShadow:`0 0 14px ${C.accent}`}}/>
              <div style={{position:"absolute",top:-6,left:"50%",transform:"translateX(-50%)",width:0,height:0,borderLeft:"8px solid transparent",borderRight:"8px solid transparent",borderTop:`12px solid ${C.accent}`,zIndex:11}}/>
              <div style={{overflow:"hidden",borderRadius:10,border:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:8,padding:8,transform:`translateX(${tx}px)`,transition:spinning?"transform 4s cubic-bezier(0.17,0.67,0.12,0.99)":"none",willChange:"transform"}}>
                  {rItems.map((item,i)=>(
                    <div key={i} style={{minWidth:IW,height:115,background:C.card,border:`2px solid ${i===WI&&!spinning&&result?RC[item.rarity]||C.accent:C.border}`,borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,padding:8,flexShrink:0,animation:i===WI&&result?"winnerPulse 1s ease infinite":"none"}}>
                      <Img item={item} size={48}/>
                      <div style={{fontSize:8,color:C.text,textAlign:"center",lineHeight:1.2}}>{item.name}</div>
                      <div style={{width:6,height:6,borderRadius:"50%",background:RC[item.rarity]||C.textMuted}}/>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
          {spinning&&<div style={{animation:"pulse 1s infinite",fontSize:13,color:C.textMuted,fontFamily:"'Rajdhani',sans-serif",letterSpacing:2}}>OCHILMOQDA...</div>}
          {result&&!spinning&&(
            <div style={{textAlign:"center",animation:"fadeIn 0.4s ease"}}>
              <div style={{fontSize:11,color:C.textMuted,fontFamily:"'Rajdhani',sans-serif",letterSpacing:3,marginBottom:12}}>TABRIKLAYMIZ!</div>
              <div style={{padding:"20px 28px",background:`${RC[result.rarity]||C.accent}12`,border:`1px solid ${RC[result.rarity]||C.accent}`,borderRadius:16,marginBottom:16,display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                <Img item={result} size={68}/>
                <div style={{fontSize:20,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,color:RC[result.rarity]||C.accent}}>{result.name}</div>
                <div className="tag" style={{background:`${RC[result.rarity]}20`,color:RC[result.rarity]}}>{result.rarity}</div>
              </div>
              <div style={{fontSize:12,color:C.green,marginBottom:16}}>✅ Inventaringizga qo'shildi!</div>
              <button className="btn-primary" onClick={close}>INVENTARGA O'TISH</button>
            </div>
          )}
          {!spinning&&!result&&<button className="btn-secondary" onClick={close} style={{marginTop:16}}>Bekor qilish</button>}
        </div>
      )}
    </div>
  );
};

//  📍 NAVIGATION BAR
// ══════════════════════════════════════════════════════════
const NavBar=({cur,setPage,invCount,taskCount})=>{
  const tabs=[
    {id:"balance",l:"Balance",i:"💎"},
    {id:"cases",l:"Cases",i:"📦"},
    {id:"tasks",l:"Vazifalar",i:"📋",badge:taskCount},
    {id:"inventory",l:"Inventar",i:"🎒",badge:invCount},
    {id:"profile",l:"Profile",i:"👤"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#13131A",borderTop:"1px solid #2A2A3A",display:"flex",zIndex:500,paddingBottom:"env(safe-area-inset-bottom,8px)"}}>
      {tabs.map(t=>(
        <button key={t.id} onClick={()=>setPage(t.id)} style={{flex:1,padding:"10px 0 8px",background:"transparent",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,opacity:cur===t.id?1:0.4,position:"relative"}}>
          <span style={{fontSize:18,lineHeight:1,position:"relative"}}>
            {t.i}
            {t.badge>0&&<span style={{position:"absolute",top:-5,right:-10,background:"#E53935",color:"#fff",fontSize:8,fontWeight:700,borderRadius:10,padding:"1px 4px",minWidth:14,textAlign:"center"}}>{t.badge}</span>}
          </span>
          <span style={{fontSize:8,fontFamily:"'Rajdhani',sans-serif",letterSpacing:1,fontWeight:700,textTransform:"uppercase",color:cur===t.id?"#C8A84B":"#7A7A9A"}}>{t.l}</span>
          {cur===t.id&&<div style={{position:"absolute",top:0,width:28,height:2,background:"#C8A84B",borderRadius:"0 0 2px 2px"}}/>}
        </button>
      ))}
    </div>
  );
};

// ══════════════════════════════════════════════════════════
//  🚀 MAIN APP
// ══════════════════════════════════════════════════════════
function App(){
  const [currentUser,setCurrentUser]=useState(null);
  const [page,setPage]=useState("balance");
  const [balance,setBalance]=useState(500);
  const [inventory,setInventory]=useState([]);
  const [completedTasks,setCompletedTasks]=useState([]);
  const [loading,setLoading]=useState(true);
  const [cases]=useState(DEFAULT_CASES);
  const [market]=useState(DEFAULT_MARKET);

  useEffect(()=>{
    tg.expand?.();tg.ready?.();
    // Auto-login check
    const curKey=LS.get("rfl_current",null);
    if(curKey){
      const users=LS.get("rfl_users",{});
      if(users[curKey]){
        const u=users[curKey];
        setCurrentUser(u);
        setBalance(u.balance||500);
        setInventory(u.inventory||[]);
        setCompletedTasks(u.completedTasks||[]);
      }
    }
    setTimeout(()=>setLoading(false),800);
  },[]);

  const saveUser=(updates)=>{
    const curKey=LS.get("rfl_current",null);
    if(!curKey)return;
    const users=LS.get("rfl_users",{});
    if(users[curKey]){
      users[curKey]={...users[curKey],...updates};
      LS.set("rfl_users",users);
    }
  };

  const handleLogin=(user)=>{
    setCurrentUser(user);
    setBalance(user.balance||500);
    setInventory(user.inventory||[]);
    setCompletedTasks(user.completedTasks||[]);
  };

  const handleLogout=()=>{
    // Saqlash
    saveUser({balance,inventory,completedTasks});
    LS.set("rfl_current",null);
    setCurrentUser(null);
    setPage("balance");
    setBalance(500);
    setInventory([]);
    setCompletedTasks([]);
  };

  // Balance o'zgarganda saqlash
  useEffect(()=>{if(currentUser)saveUser({balance});},[balance]);
  useEffect(()=>{if(currentUser)saveUser({inventory});},[inventory]);

  const onTaskComplete=(taskId)=>{
    if(completedTasks.includes(taskId))return;
    // task reward map
    const rewards={open_first_case:100,buy_market:75,daily_login:25,profile_complete:30};
    const reward=rewards[taskId]||0;
    const newDone=[...completedTasks,taskId];
    setCompletedTasks(newDone);
    if(reward>0) setBalance(b=>b+reward);
    saveUser({completedTasks:newDone,balance:balance+reward});
  };

  if(loading) return(
    <div style={{height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0A0A0F",gap:16}}>
      <div style={{animation:"floatCrystal 2s ease-in-out infinite"}}>
        <svg width={56} height={56} viewBox="0 0 24 24">
          <polygon points="12,2 20,8 20,16 12,22 4,16 4,8" fill="#C8A84B" opacity="0.95"/>
          <polygon points="12,2 20,8 12,12" fill="rgba(255,255,255,0.35)"/>
          <polygon points="4,8 12,12 12,22" fill="rgba(0,0,0,0.25)"/>
        </svg>
      </div>
      <div style={{fontFamily:"'Rajdhani',sans-serif",fontSize:28,fontWeight:700,letterSpacing:5,color:"#C8A84B"}}>RFL PRO</div>
      <div style={{animation:"spin 1s linear infinite",fontSize:22,color:"#7A7A9A"}}>⟳</div>
    </div>
  );

  if(!currentUser) return <AuthScreen onLogin={handleLogin}/>;

  const user={...currentUser,first_name:currentUser.name||currentUser.first_name};
  const activeInv=inventory.filter(i=>!i.status).length;
  const pendingTasks=8-completedTasks.length-(completedTasks.includes("daily_login")?0:1);

  return(
    <div style={{maxWidth:480,margin:"0 auto",position:"relative"}}>
      {page==="balance"&&<BalancePage user={user} balance={balance} setBalance={setBalance}/>}
      {page==="cases"&&<CasesPage user={user} balance={balance} setBalance={setBalance} setInventory={setInventory} cases={cases} onTaskComplete={onTaskComplete}/>}
      {page==="tasks"&&<TasksPage user={user} balance={balance} setBalance={setBalance} completedTasks={completedTasks} setCompletedTasks={setCompletedTasks} saveUser={saveUser}/>}
      {page==="inventory"&&<InventoryPage user={user} balance={balance} inventory={inventory} setInventory={setInventory}/>}
      {page==="profile"&&<ProfilePage user={user} balance={balance} inventory={inventory} onLogout={handleLogout}/>}
      <NavBar cur={page} setPage={setPage} invCount={activeInv} taskCount={Math.max(0,pendingTasks)}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
